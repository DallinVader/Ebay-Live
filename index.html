<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eBay Live — Stream Console</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Console -->
        <div id="console" class="console">
            <header class="console-header">
                <div class="brand">
                    <span class="brand-icon" aria-hidden="true">●</span>
                    <h1>eBay Live Console</h1>
                </div>
                <div class="header-actions">
                    <span id="stream-status" class="status-badge status-idle">Ready</span>
                    <button id="fullscreen-btn" type="button" class="btn btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                        </svg>
                        Full Screen Camera
                    </button>
                </div>
            </header>

            <main class="console-body">
                <section class="panel preview-panel">
                    <h2>Camera Preview</h2>
                    <div class="preview-wrapper">
                        <video id="camera-preview" autoplay playsinline muted></video>
                        <p id="camera-error" class="error-text hidden">Camera access denied or unavailable.</p>
                    </div>
                    <p class="hint">This preview mirrors your fullscreen output settings.</p>
                </section>

                <section class="panel settings-panel">
                    <h2>Stream Settings</h2>

                    <div class="setting-group">
                        <label for="camera-select">Camera</label>
                        <select id="camera-select">
                            <option value="">Loading cameras…</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label for="mic-select">Microphone</label>
                        <select id="mic-select">
                            <option value="">Loading microphones…</option>
                        </select>
                    </div>

                    <div class="setting-row">
                        <label class="toggle-label" for="mirror-toggle">
                            <input type="checkbox" id="mirror-toggle">
                            <span class="toggle-switch" aria-hidden="true"></span>
                            Mirror camera
                        </label>
                    </div>

                    <div class="setting-row">
                        <label class="toggle-label" for="show-overlay-toggle">
                            <input type="checkbox" id="show-overlay-toggle" checked>
                            <span class="toggle-switch" aria-hidden="true"></span>
                            Show live badge in fullscreen
                        </label>
                    </div>
                </section>

                <section class="panel music-panel">
                    <h2>Background Music</h2>

                    <div class="setting-group">
                        <label for="music-upload">Music track</label>
                        <div class="file-input-row">
                            <input type="file" id="music-upload" accept="audio/*">
                            <span id="music-filename" class="filename">No track selected</span>
                        </div>
                    </div>

                    <div class="setting-group">
                        <label for="music-volume">
                            Volume
                            <span id="music-volume-value" class="value-label">50%</span>
                        </label>
                        <input type="range" id="music-volume" min="0" max="100" value="50">
                    </div>

                    <div class="setting-row">
                        <label class="toggle-label" for="music-loop-toggle">
                            <input type="checkbox" id="music-loop-toggle" checked>
                            <span class="toggle-switch" aria-hidden="true"></span>
                            Loop track
                        </label>
                    </div>

                    <div class="music-controls">
                        <button id="music-play-btn" type="button" class="btn btn-secondary" disabled>Play</button>
                        <button id="music-stop-btn" type="button" class="btn btn-ghost" disabled>Stop</button>
                    </div>
                </section>
            </main>

            <footer class="console-footer">
                <p>Press <kbd>Esc</kbd> while fullscreen to return to this console.</p>
            </footer>
        </div>

        <!-- Fullscreen camera output -->
        <div id="fullscreen-view" class="fullscreen-view hidden" tabindex="-1">
            <video id="camera-fullscreen" autoplay playsinline muted></video>
            <div id="live-overlay" class="live-overlay">
                <span class="live-dot" aria-hidden="true"></span>
                LIVE
            </div>
            <p class="fullscreen-hint">Press <kbd>Esc</kbd> to exit fullscreen</p>
        </div>
    </div>

    <audio id="music-player" loop></audio>

    <script src="js/app.js"></script>
</body>
</html>
